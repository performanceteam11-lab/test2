<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 쇼핑 모니터링 대시보드</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --green: #3fb950;
      --blue: #58a6ff;
      --orange: #e3b341;
      --red: #f85149;
      --purple: #bc8cff;
      --teal: #39d0d8;
      --text: #e6edf3;
      --muted: #8b949e;
      --ad-color: #ff6b35;
      --organic-color: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #03c75a, #58a6ff);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 18px; font-weight: 700; }
    .logo p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .header-right { text-align: right; font-size: 12px; color: var(--muted); }
    .header-right .ts { font-size: 14px; color: var(--text); font-weight: 500; }

    /* ── 레이아웃 ── */
    main { padding: 28px 32px; max-width: 1600px; margin: 0 auto; }

    /* ── 통계 카드 ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-value { font-size: 30px; font-weight: 700; line-height: 1; }
    .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .c-blue   .stat-value { color: var(--blue); }
    .c-green  .stat-value { color: var(--green); }
    .c-orange .stat-value { color: var(--orange); }
    .c-purple .stat-value { color: var(--purple); }
    .c-teal   .stat-value { color: var(--teal); }

    /* ── 섹션 타이틀 ── */
    .section-title {
      font-size: 15px; font-weight: 600;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── 검색 / 필터 바 ── */
    .filter-bar {
      display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .filter-bar input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px;
      color: var(--text); font-size: 13px; width: 240px;
      outline: none;
    }
    .filter-bar input:focus { border-color: var(--blue); }
    .filter-btn {
      padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .filter-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(88,166,255,.08); }
    .search-btn { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 600; padding: 7px 18px; }
    .search-btn:hover { background: #4a9ee0; }

    /* ── 메인 테이블 ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 40px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--surface2); }
    th {
      padding: 11px 14px;
      text-align: left;
      font-weight: 600; font-size: 11px;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* 지면 배지 */
    .badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
      white-space: nowrap;
    }
    .badge-gc   { background: rgba(88,166,255,.12); color: var(--blue); border: 1px solid rgba(88,166,255,.25); }   /* 가격비교 */
    .badge-np   { background: rgba(188,140,255,.12); color: var(--purple); border: 1px solid rgba(188,140,255,.25); } /* N플러스 */
    .badge-og   { background: rgba(63,185,80,.12); color: var(--green); border: 1px solid rgba(63,185,80,.25); }     /* 오가닉 */

    /* 플랫폼 */
    .plat-pc  { color: var(--blue);   font-weight: 700; font-size: 12px; }
    .plat-mo  { color: var(--green);  font-weight: 700; font-size: 12px; }
    .plat-com { color: var(--muted);  font-weight: 600; font-size: 12px; }

    /* 순위 */
    .rank { font-weight: 700; }
    .rank.r1  { color: var(--orange); }
    .rank.r3  { color: var(--blue); }
    .rank.r10 { color: var(--green); }

    /* 광고/오가닉 배지 */
    .tag-ad  { background: rgba(255,107,53,.15); color: var(--ad-color);      border: 1px solid rgba(255,107,53,.3);  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .tag-org { background: rgba(63,185,80,.12);  color: var(--organic-color); border: 1px solid rgba(63,185,80,.25); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .tag-gen { background: rgba(139,148,158,.1); color: var(--muted);         border: 1px solid var(--border);       font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }

    .product-name-cell { max-width: 380px; word-break: keep-all; line-height: 1.45; }
    .kw-cell { font-weight: 600; }
    .price-cell { color: var(--muted); white-space: nowrap; }
    .no-rows td { text-align: center; color: var(--muted); padding: 32px; }
    .kw-cell-merged {
      vertical-align: middle !important;
      font-weight: 700;
      cursor: pointer;
      border-right: 2px solid var(--border);
    }
    .kw-cell-merged:hover { color: var(--blue); }
    .kw-row-selected td { background: rgba(88,166,255,.06) !important; }
    .kw-row-selected .kw-cell-merged { color: var(--blue); border-right-color: var(--blue); }
    .kw-group-divider td { border-top: 2px solid var(--border) !important; }
    .kw-hint { font-size: 12px; color: var(--muted); font-style: italic; text-align: center; padding: 40px; }

    /* ── 키워드 카드 그리드 ── */
    .kw-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }
    .kw-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: border-color .2s;
    }
    .kw-card:hover { border-color: var(--blue); }
    .kw-head {
      background: var(--surface2);
      padding: 13px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .kw-name { font-size: 14px; font-weight: 700; }
    .found-yes { background: rgba(63,185,80,.15); color: var(--green); font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .found-no  { background: rgba(248,81,73,.15);  color: var(--red);   font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }

    .kw-body { padding: 12px 16px; }
    .plat-head {
      font-size: 11px; font-weight: 700; letter-spacing: .7px;
      margin: 10px 0 8px; display: flex; align-items: center; gap: 6px;
    }
    .kw-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* 미니 상품 행 */
    .mini-item {
      background: var(--surface2); border-radius: 7px;
      padding: 9px 12px; margin-bottom: 6px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .mini-rank {
      min-width: 30px; height: 30px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--muted);
      flex-shrink: 0;
    }
    .mini-rank.r1  { background: rgba(227,179,65,.15); border-color: var(--orange); color: var(--orange); }
    .mini-rank.r3  { background: rgba(88,166,255,.1);  border-color: var(--blue);   color: var(--blue); }
    .mini-rank.r10 { background: rgba(63,185,80,.1);   border-color: var(--green);  color: var(--green); }
    .mini-info { flex: 1; min-width: 0; }
    .mini-name { font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; word-break: keep-all; }
    .mini-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .mini-price { font-size: 11px; color: var(--muted); }
    .mini-sec  { font-size: 10px; font-weight: 700; color: var(--muted); }
    .no-result { text-align: center; color: var(--muted); font-size: 12px; padding: 12px 0; }

    /* empty */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .empty code { background: var(--surface2); padding: 2px 8px; border-radius: 4px; color: var(--blue); font-family: monospace; }

    footer {
      border-top: 1px solid var(--border);
      padding: 18px 32px;
      text-align: center;
      font-size: 12px; color: var(--muted);
    }
  </style>
</head>

<header>
  <div class="logo">
    <div class="logo-icon">🔍</div>
    <div>
      <h1>쇼핑 검색 모니터링</h1>
      <p>샤크닌자 코리아 · 네이버 쇼핑</p>
    </div>
  </div>
  <div class="header-right">
    <div class="ts" id="ts">데이터 없음</div>
    <div>마지막 업데이트</div>
  </div>
</header>

<main>
  <!-- 검색바: render()와 무관하게 고정 (재생성 안됨) -->
  <div id="filter-bar-wrap" style="display:none">
    <div class="section-title" style="margin-bottom:14px">
      <span class="dot" style="background:var(--blue)"></span>
      노출 순위 테이블

    <div class="filter-bar">
      <input id="kw-search"      type="text" placeholder="키워드 검색…"  onkeydown="if(event.key==='Enter')doSearch()" />

      <button class="filter-btn" data-group="section" data-val="shopping" onclick="setActive('section','shopping')">가격비교</button>
      <button class="filter-btn" data-group="section" data-val="nstore"   onclick="setActive('section','nstore')">N플러스</button>
      <button class="filter-btn" data-group="section" data-val="organic"  onclick="setActive('section','organic')">오가닉</button>
      &nbsp;
      <button class="filter-btn" data-group="plat" data-val="all" onclick="setActive('plat','all')">전체</button>
      <button class="filter-btn" data-group="plat" data-val="PC"  onclick="setActive('plat','PC')">PC</button>
      <button class="filter-btn" data-group="plat" data-val="MO"  onclick="setActive('plat','MO')">MO</button>
      &nbsp;
      <button class="filter-btn" data-group="ad" data-val="all"     onclick="setActive('ad','all')">전체</button>
      <button class="filter-btn" data-group="ad" data-val="ad"      onclick="setActive('ad','ad')">광고</button>
      <button class="filter-btn" data-group="ad" data-val="organic" onclick="setActive('ad','organic')">오가닉</button>
    </div>
  </div>
  <div id="app"></div>
</main>

<footer>
  monitor.py 실행 후 새로고침 &nbsp;·&nbsp; 결과는 results/ 폴더에 저장됩니다
</footer>

/* ── 헬퍼 ── */
function rankClass(r) {
  if (r === 1) return 'r1';
  if (r <= 3)  return 'r3';
  if (r <= 10) return 'r10';
  return '';
}
function sectionBadge(sec) {
  const map = { shopping: ['가격비교','badge-gc'], nstore: ['N플러스','badge-np'], organic: ['오가닉','badge-og'] };
  const [label, cls] = map[sec] || [sec, 'badge-gc'];
  return `<span class="badge ${cls}">${label}</span>`;
}
function adTag(row) {
  if (row.ad_type === '광고')    return `<span class="tag-ad">광고</span>`;
  if (row.ad_type === '오가닉')  return `<span class="tag-org">오가닉</span>`;
  return `<span class="tag-gen">일반</span>`;
}
function platClass(p) {
  if (p === 'PC')   return 'plat-pc';
  if (p === 'MO')   return 'plat-mo';
  return 'plat-com';
}

/* ── 한글 초성 검색 헬퍼 ── */
const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function toChosung(str) {
  return str.split('').map(c => {
    const code = c.charCodeAt(0) - 0xAC00;
    if (code < 0 || code > 11171) return c;
    return CHO[Math.floor(code / 588)];
  }).join('');
}
function fuzzyMatch(target, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  const t = target.toLowerCase();
  if (t.includes(q)) return true;
  // 쿼리가 전부 초성/자모로만 이루어진 경우 초성 매칭
  const isChoOnly = [...q].every(c => CHO.includes(c));
  if (isChoOnly) return toChosung(t).includes(q);
  return false;
}

/* ── 상태 ── */
let activeSection  = 'all'; // all / shopping / nstore / organic
let activePlat     = 'all'; // all / PC / MO
let activeAd       = 'all'; // all / ad / organic
let searchKw       = '';
let searchProduct  = '';
let selectedKw     = null;

/* ── 필터링 ── */
function filterRows(rows) {
  return rows.filter(r => {
    if (activeSection === 'shopping' && r.section !== 'shopping') return false;
    if (activeSection === 'nstore'   && r.section !== 'nstore')   return false;
    if (activeSection === 'organic'  && r.section !== 'organic')  return false;
    if (activePlat === 'PC' && r.platform !== 'PC')  return false;
    if (activePlat === 'MO' && r.platform !== 'MO')  return false;
    if (activeAd === 'ad'      && r.ad_type !== '광고')   return false;
    if (activeAd === 'organic' && r.section !== 'organic') return false;
    if (searchKw      && !fuzzyMatch(r.keyword,      searchKw))      return false;
    if (searchProduct && !fuzzyMatch(r.product_name, searchProduct)) return false;
    return true;
  });
}

/* ── 통계 ── */
function buildStats(results, allKeywords) {
  const keywords = allKeywords || [...new Set(results.map(r => r.keyword))];
  const adRows   = results.filter(r => r.ad_type === '광고');
  const rank1    = results.filter(r => r.rank === 1);
  const ogRows   = results.filter(r => r.section === 'organic');
  return `
  <div class="stats-grid">
    <div class="stat-card c-blue">
      <div class="stat-label">모니터링 키워드</div>
      <div class="stat-value">${keywords.length}</div>
      <div class="stat-sub">노출결과 ${results.length}개</div>
    </div>
    <div class="stat-card c-orange">
      <div class="stat-label">광고 노출</div>
      <div class="stat-value">${adRows.length}</div>
      <div class="stat-sub">가격비교 + N플러스</div>
    </div>
    <div class="stat-card c-green">
      <div class="stat-label">1위 노출</div>
      <div class="stat-value">${rank1.length}</div>
      <div class="stat-sub">순위 1위 항목</div>
    </div>
    <div class="stat-card c-purple">
      <div class="stat-label">오가닉 순위</div>
      <div class="stat-value">${ogRows.length}</div>
      <div class="stat-sub">API 오가닉 결과</div>
    </div>
    <div class="stat-card c-teal">
      <div class="stat-label">최소 오가닉 순위</div>
      <div class="stat-value">${ogRows.length ? Math.min(...ogRows.map(r=>r.rank)) : '-'}</div>
      <div class="stat-sub">낮을수록 상위 노출</div>
    </div>
  </div>`;
}

/* ── 메인 테이블 ── */
function buildTable(rows) {
  if (!rows.length) return `<div class="table-wrap"><p class="kw-hint">필터 조건에 맞는 결과가 없습니다</p></div>`;

  // 키워드별 그룹화 및 rowspan 계산
  const groups = [];
  let cur = null;
  rows.forEach(r => {
    if (!cur || cur.keyword !== r.keyword) {
      cur = { keyword: r.keyword, rows: [] };
      groups.push(cur);
    }
    cur.rows.push(r);
  });

  let html = `
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>키워드</th><th>지면</th><th>플랫폼</th><th>순위</th><th>구분</th><th>상품명</th><th>가격</th>
        </tr>
      </thead>
      <tbody>`;

  groups.forEach(g => {
    const isSelected = selectedKw === g.keyword;
    g.rows.forEach((r, idx) => {
      const rc = rankClass(r.rank);
      const kwClass = isSelected ? 'kw-row-selected' : '';
      const divClass = idx === 0 ? 'kw-group-divider' : '';
      html += `<tr class="${kwClass} ${divClass}">`;
      if (idx === 0) {
        html += `<td class="kw-cell-merged" rowspan="${g.rows.length}" onclick="toggleKw('${g.keyword.replace(/'/g,"\\'")}')">
          ${g.keyword}
        </td>`;
      }
      html += `
        <td>${sectionBadge(r.section)}</td>
        <td><span class="${platClass(r.platform)}">${r.platform}</span></td>
        <td><span class="rank ${rc}">${r.rank}위</span></td>
        <td>${adTag(r)}</td>
        <td class="product-name-cell">${r.product_name}</td>
        <td class="price-cell">${r.price_str || '-'}</td>
      </tr>`;
    });
  });

  html += `</tbody></table></div>`;
  return html;
}

/* ── 키워드 카드 ── */
function buildCards(summary, keywords) {
  let html = '';
  keywords.forEach(kw => {
    const kwData = summary[kw];
    if (!kwData) return;

    const allRows = [...(kwData.PC||[]), ...(kwData.MO||[]), ...(kwData.organic||[])];
    const found   = allRows.length > 0;

    html += `<div class="kw-card">
      <div class="kw-head">
        <span class="kw-name">${kw}</span>
        <span class="${found ? 'found-yes' : 'found-no'}">${found ? '노출 중' : '미노출'}</span>
      </div>
      <div class="kw-body">`;

    ['PC','MO'].forEach(plat => {
      const rows = kwData[plat] || [];
      if (!rows.length) return;
      html += `<div class="plat-head"><span class="${platClass(plat)}">${plat}</span></div>`;
      rows.forEach(r => {
        const rc = rankClass(r.rank);
        html += `<div class="mini-item">
          <div class="mini-rank ${rc}">${r.rank}</div>
          <div class="mini-info">
            <div class="mini-name">${r.product_name}</div>
            <div class="mini-meta">
              ${sectionBadge(r.section)} ${adTag(r)}
              <span class="mini-price">${r.price_str||''}</span>
            </div>
          </div>
        </div>`;
      });
      html += `<hr class="kw-divider">`;
    });

    const ogRows = kwData.organic || [];
    if (ogRows.length) {
      html += `<div class="plat-head"><span class="badge badge-og">오가닉</span></div>`;
      ogRows.forEach(r => {
        const rc = rankClass(r.rank);
        html += `<div class="mini-item">
          <div class="mini-rank ${rc}">${r.rank}</div>
          <div class="mini-info">
            <div class="mini-name">${r.product_name}</div>
            <div class="mini-meta">
              <span class="tag-org">오가닉</span>
              <span class="mini-price">${r.price_str||''}</span>
            </div>
          </div>
        </div>`;
      });
    }

    html += `</div></div>`;
  });
  return html || `<p class="kw-hint">키워드 카드 없음</p>`;
}

/* ── 키워드 토글 ── */
function toggleKw(kw) {
  selectedKw = selectedKw === kw ? null : kw;
  render();
}

/* ── 필터 버튼 활성화 ── */
function setActive(group, val) {
  if (group === 'section') activeSection = val;
  if (group === 'plat')    activePlat    = val;
  if (group === 'ad')      activeAd      = val;
  render();
}

/* ── 렌더링 ── */
function render() {
  if (!MONITOR_DATA) return;
  const { results, summary, keywords, timestamp } = MONITOR_DATA;

  document.getElementById('ts').textContent = timestamp || '데이터 없음';
  document.getElementById('filter-bar-wrap').style.display = '';

  const filtered = filterRows(results);

  // 필터 버튼 상태 갱신
  document.querySelectorAll('.filter-btn[data-group]').forEach(btn => {
    const g = btn.dataset.group, v = btn.dataset.val;
    const cur = g === 'section' ? activeSection : g === 'plat' ? activePlat : activeAd;
    btn.classList.toggle('active', cur === v);
  });

  const kwsToShow = selectedKw
    ? [selectedKw]
    : keywords.filter(kw => !searchKw || fuzzyMatch(kw, searchKw));

  document.getElementById('app').innerHTML = `
    ${buildStats(results, keywords)}

    ${buildTable(filtered)}

    <div class="section-title" style="margin-top:8px">
      <span class="dot" style="background:var(--purple)"></span>
      키워드별 노출 현황
      ${selectedKw
        ? `<span style="font-size:12px;color:var(--muted);font-weight:400">&nbsp;· 클릭한 키워드: <strong style="color:var(--blue)">${selectedKw}</strong> (다시 클릭하면 전체)</span>`
        : `<span style="font-size:12px;color:var(--muted);font-weight:400">&nbsp;· 키워드 행을 클릭하면 해당 카드만 표시</span>`}
    </div>
    <div class="kw-grid">${buildCards(summary, kwsToShow)}</div>
  `;
}

function doSearch() {
  searchKw      = (document.getElementById('kw-search').value      || '').trim();
  searchProduct = (document.getElementById('product-search').value || '').trim();
  render();
}

/* ── 초기 실행 ── */
if (MONITOR_DATA) {
  render();
} else {
  document.getElementById('app').innerHTML = `
    <div class="empty">
      <h2>데이터가 없습니다</h2>
      <p>터미널에서 <code>python monitor.py --keywords 샤크무선청소기</code> 를 실행하세요</p>
    </div>`;
}
</script>
</body>
